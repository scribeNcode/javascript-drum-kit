<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Drum Kit</title>
  </head>
  <body>
    <div class="drum-kits-wrapper">
      <div id="clap-el" class="drum-kit">
        A
        <span>CLAP</span>
      </div>
      <div id="hihat-el" class="drum-kit">
        S
        <span>HIHAT</span>
      </div>
      <div id="kick-el" class="drum-kit">
        D
        <span>KICK</span>
      </div>
      <div id="openhat-el" class="drum-kit">
        F
        <span>OPENHAT</span>
      </div>
      <div id="boom-el" class="drum-kit">
        G
        <span>BOOM</span>
      </div>
      <div id="ride-el" class="drum-kit">
        H
        <span>RIDE</span>
      </div>
      <div id="snare-el" class="drum-kit">
        J
        <span>SNARE</span>
      </div>
      <div id="tom-el" class="drum-kit">
        K
        <span>TOM</span>
      </div>
      <div id="tink-el" class="drum-kit">
        L
        <span>TINK</span>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
