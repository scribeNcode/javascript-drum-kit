<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" as="image" href="Images/backgroundImg.jpg" />
    <link rel="stylesheet" href="style.css" />
    <title>Drum Kit</title>
  </head>
  <body>
    <div data-key="65" class="drum-kits-wrapper">
      <div  class="drum-kit">
        <kbd>A</kbd>
        <span>CLAP</span>
      </div>
      <div data-key="83" class="drum-kit">
        <kbd>S</kbd>
        <span>HIHAT</span>
      </div>
      <div data-key="68" class="drum-kit">
        <kbd>D</kbd>
        <span>KICK</span>
      </div>
      <div data-key="70" class="drum-kit">
        <kbd>F</kbd>
        <span>OPENHAT</span>
      </div>
      <div data-key="71" class="drum-kit">
        <kbd>G</kbd>
        <span>BOOM</span>
      </div>
      <div  class="drum-kit">
        <kbd>H</kbd>
        <span>RIDE</span>
      </div>
      <div data-key="74"  class="drum-kit">
        <kbd>J</kbd>
        <span>SNARE</span>
      </div>
      <div data-key="75" class="drum-kit">
        <kbd>K</kbd>
        <span>TOM</span>
      </div>
      <div data-key="76"  class="drum-kit">
        <kbd>L</kbd>
        <span>TINK</span>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
